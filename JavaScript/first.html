<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacaScript Basics</title>
    <link rel="stylesheet" href="./first.css">
    <script>
       function alertFun(){
            alert("Hello world")
       }
    </script>
</head>
<body>

<!-- type of js -->
 <!-- There are three type of javaScript :  -->
  <!-- 1.Inline JS -->
   <button onclick="alert('Hello world')">Inline Click</button>
   <!-- 2.Internal Js -->
    <button onclick="alertFun()">Internal Click</button>
    <!-- 3.External Js -->
    <button id="btnClick">External Click</button>

    <br><br>
    <!-- Lump on and off -->
     <div>

         <button id="onLump">onLump</button>
         <img src="https://www.w3schools.com/js/pic_bulboff.gif" id="lump_img" alt="">
         <button id="offLump">offLump</button>
     </div>
     
    <!-- print -->
     <button onclick="window.print()">print</button>

     
     <div>

         <input type="text" name="pattern" id="pattern" placeholder="Enter number : ">
         <button class="patterBtn">click</button>
    </div>
     <div class="patternDisplay"></div>
    <script src="./first.js"></script>
</body>
</html>
